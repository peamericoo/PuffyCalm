[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Shell required so ${PORT} expands (literal $PORT breaks uvicorn --port).
startCommand = "sh -c 'alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
